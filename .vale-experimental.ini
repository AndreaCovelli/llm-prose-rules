StylesPath = styles
MinAlertLevel = warning
Vocab = prose-harness

[*.md]
BasedOnStyles = prose-harness, voice-dna, prose-harness-experimental

[formats]
COMMIT_EDITMSG = md

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG}]
BasedOnStyles = prose-harness-commits

[{tests/commits/pass/COMMIT_EDITMSG,tests/commits/fail/COMMIT_EDITMSG}]
BasedOnStyles = prose-harness-commits

[tests/prose/fail/*.md]
BasedOnStyles =

[tests/commits/fail/COMMIT_EDITMSG]
BasedOnStyles =

[tests/rules/**/*.md]
BasedOnStyles =
