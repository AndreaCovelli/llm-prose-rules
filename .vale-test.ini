StylesPath = styles
MinAlertLevel = warning
Vocab = llm-prose-rules

[tests/prose/**/*.md]
BasedOnStyles = llm-prose-rules, voice-dna

[tests/rules/prose-errors/*.md]
BasedOnStyles = llm-prose-rules, voice-dna

[tests/rules/voice-warnings/*.md]
BasedOnStyles = voice-dna

[tests/rules/experimental-warnings/*.md]
BasedOnStyles = llm-prose-rules-experimental

[tests/rules/experimental-pass/*.md]
BasedOnStyles = llm-prose-rules-experimental

[tests/rules/regressions/*.md]
BasedOnStyles = llm-prose-rules, voice-dna

[formats]
COMMIT_EDITMSG = md

[{tests/commits/pass/COMMIT_EDITMSG,tests/commits/fail/COMMIT_EDITMSG}]
BasedOnStyles = llm-prose-rules-commits

[tests/rules/commit-errors/*.md]
BasedOnStyles = llm-prose-rules-commits

[tests/rules/commit-warnings/*.md]
BasedOnStyles = llm-prose-rules-commits
