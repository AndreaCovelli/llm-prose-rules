---
extends: existence
message: "LLM-style punctuation: '%s'. When the ideas belong in one sentence, join them with a comma and a conjunction; use a period only when they are genuinely separate."
level: warning
nonword: true
# This rule targets comma-free semicolon continuations that can create a clipped,
# add-on rhythm. When the ideas belong together, prefer one natural sentence by
# joining the clauses with a comma and a coordinating conjunction. Keep a
# semicolon for closely related independent clauses when it gives the sentence
# the right weight; use a period only when the ideas are genuinely separate.
# The token flags only a comma-free clause-final continuation and exempts the
# conjunctive adverbs that join clauses without one. Google.Semicolons still
# warns on the rest.
exceptions:
  - "(?i)however"
  - "(?i)therefore"
  - "(?i)thus"
  - "(?i)hence"
  - "(?i)moreover"
  - "(?i)furthermore"
  - "(?i)consequently"
  - "(?i)nevertheless"
  - "(?i)nonetheless"
  - "(?i)otherwise"
  - "(?i)meanwhile"
  - "(?i)accordingly"
  - "(?i)besides"
  - "(?i)indeed"
  - "(?i)namely"
  - "(?i)instead"
tokens:
  - "; [^,;\\n]*[.!?]"
